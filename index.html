<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  const EMAILJS_PUBLIC_KEY  = "SsfcXVarAoDXU52Fn";
  const EMAILJS_SERVICE_ID  = "service_9sfomfm";
  const EMAILJS_TEMPLATE_ID = "template_g7zgn9u";
  const ALERT_EMAIL_TO      = "david.rosa23@gmail.com";

  window.EMAILJS_READY = EMAILJS_PUBLIC_KEY !== "TU_PUBLIC_KEY";
  if (window.EMAILJS_READY) {
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
    console.log("✅ EmailJS listo");
  } else {
    console.warn("⚠️ EmailJS no configurado");
  }

  window.sendAlertEmail = async function(record, alertLevel) {
    if (!window.EMAILJS_READY) return;
    if (alertLevel === 'verde') return;
    const nivelLabel = alertLevel === 'rojo' ? '🔴 URGENTE' : '🟡 MODERADA';
    const params = {
      email: ALERT_EMAIL_TO, to_email: ALERT_EMAIL_TO,
      nivel: nivelLabel, paciente: record.patientId, fecha: record.fecha,
      tipo_visita: record.tipoVisita === 'urgente' ? 'Por síntomas' :
                   record.tipoVisita === 'seguimiento' ? 'Seguimiento post-exacerbación' : 'Semanal',
      murray: record.murray, cat: record.cat, basal: record.baseline ?? '—',
      cambio_cat: record.baseline != null ? (record.cat - record.baseline > 0 ? '+' : '') + (record.cat - record.baseline) : '—',
      sintomas: record.symptoms?.length ? record.symptoms.join(', ') : 'Ninguno',
      bienestar: record.wellbeing === 'peor' ? 'Claramente peor' :
                 record.wellbeing === 'algo-peor' ? 'Algo peor' :
                 record.wellbeing === 'mejor' ? 'Mejor' : 'Igual que siempre',
    };
    try { await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params); }
    catch(e) { console.error("Error enviando email:", e); }
  };
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyDWSlIpEB7CE3YUzbgBrSXD9DBMiFW6xdQ",
    authDomain:        "bronco-color.firebaseapp.com",
    projectId:         "bronco-color",
    storageBucket:     "bronco-color.firebasestorage.app",
    messagingSenderId: "1005269772117",
    appId:             "1:1005269772117:web:aa14c63eeebc21e847b1dc"
  };

  window.FIREBASE_READY = false;
  window.DB = null;

  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    const storage = firebase.storage();
    window.FIREBASE_READY = true;
    window.DB = {
      async saveRecord(record) {
        let imageUrl = null;
        if (record.image && record.image.startsWith('data:')) {
          try {
            const blob = await (await fetch(record.image)).blob();
            const ref  = storage.ref(`esputo/${record.patientId}/${record.id}.jpg`);
            await ref.put(blob);
            imageUrl = await ref.getDownloadURL();
          } catch(e) { imageUrl = record.image; }
        }
        return await db.collection("registros").add({
          ...record, image: imageUrl, timestamp: firebase.firestore.Timestamp.now()
        });
      },
      async getRecords(patientId) {
        const snap = await db.collection("registros")
          .where("patientId","==",patientId).orderBy("fecha","asc").get();
        return snap.docs.map(d=>({id:d.id,...d.data()}));
      },
      async getAllRecords() {
        const snap = await db.collection("registros").orderBy("timestamp","desc").get();
        return snap.docs.map(d=>({id:d.id,...d.data()}));
      },
      // ── PERFILES CLÍNICOS ──────────────────────────────────────────
      async saveProfile(pid, profile) {
        await db.collection("perfiles").doc(pid).set({
          ...profile, updatedAt: firebase.firestore.Timestamp.now()
        });
      },
      async getProfile(pid) {
        const doc = await db.collection("perfiles").doc(pid).get();
        return doc.exists ? doc.data() : null;
      },
      async getAllProfiles() {
        const snap = await db.collection("perfiles").get();
        const result = {};
        snap.docs.forEach(d => { result[d.id] = d.data(); });
        return result;
      }
    };
    console.log("✅ Firebase conectado");
  } catch(e) {
    console.warn("⚠️ Firebase no disponible — modo demo:", e.message);
  }
</script>

// ═══════════════════════════════════════════════════
let ANTHROPIC_API_KEY = null; // se carga en initApiKey()

async function initApiKey() {
  if (!window.FIREBASE_READY) return;
  try {
    const snap = await firebase.firestore().collection('config').doc('keys').get();
    if (snap.exists && snap.data().anthropic) {
      ANTHROPIC_API_KEY = snap.data().anthropic;
      console.log("✅ Clave API cargada desde Firebase");
      // Actualizar indicador en panel clínico si está visible
      const dot = document.getElementById('db-dot');
      if (dot) dot.title = (dot.title || '') + ' · IA lista';
    } else {
      console.warn("⚠️ No se encontró la clave API en Firestore (config/keys → anthropic)");
    }
  } catch(e) {
    console.warn("⚠️ No se pudo cargar la clave API:", e.message);
  }
}

// ─── SCORES BSI / e-FACED ───────────────────────────────────────────
function computeBSI(p) {
  if (!p) return null;
  let score = 0;
  // Edad
  const age = parseInt(p.age) || 0;
  if (age >= 80) score += 6;
  else if (age >= 70) score += 4;
  else if (age >= 50) score += 2;
  // IMC
  const w = parseFloat(p.weight), h = parseFloat(p.height);
  if (w > 0 && h > 0) { const bmi = w / ((h/100)**2); if (bmi < 18.5) score += 2; }
  // FEV1%
  const fev = parseFloat(p.fev1pct) || 0;
  if (fev < 30) score += 3;
  else if (fev < 50) score += 2;
  else if (fev <= 80) score += 1;
  // Hospitalización previa (peso 5)
  if (p.hospPrev) score += 5;
  // Exacerbaciones año previo
  const exac = parseInt(p.exacPrev) || 0;
  if (exac >= 3) score += 2;
  // mMRC (usando escala 0-4 → equivale a MRC 1-5)
  const mrc = parseInt(p.mrc) || 0;
  if (mrc === 4) score += 3;
  else if (mrc === 3) score += 2;
  // P. aeruginosa
  if (p.psa) score += 3;
  // Otros PPM
  if (p.otherPPM) score += 1;
  // Extensión: ≥3 lóbulos o quísticas
  const lobes = parseInt(p.lobes) || 0;
  if (lobes >= 3 || p.cystic) score += 1;
  return Math.min(score, 24);
}

function computeEFACED(p) {
  if (!p) return null;
  let score = 0;
  const fev = parseFloat(p.fev1pct) || 0;
  if (fev < 50) score += 2;
  const age = parseInt(p.age) || 0;
  if (age >= 70) score += 2;
  if (p.psa) score += 1;
  const lobes = parseInt(p.lobes) || 0;
  if (lobes > 2) score += 1;
  const mrc = parseInt(p.mrc) || 0;
  if (mrc >= 3) score += 2;
  const exac = parseInt(p.exacPrev) || 0;
  if (exac >= 1) score += 2;
  return Math.min(score, 9);
}

function bsiSeverity(s) {
  if (s === null || s === undefined) return {label:'—',cls:'sev-leve',color:'var(--grey-400)'};
  if (s <= 4)  return {label:'Leve',    cls:'sev-leve', color:'#16A34A'};
  if (s <= 8)  return {label:'Moderado',cls:'sev-mod',  color:'#D97706'};
  return             {label:'Grave',    cls:'sev-grave', color:'#DC2626'};
}
function efacedSeverity(s) {
  if (s === null || s === undefined) return {label:'—',cls:'sev-leve',color:'var(--grey-400)'};
  if (s <= 3)  return {label:'Leve',    cls:'sev-leve', color:'#16A34A'};
  if (s <= 6)  return {label:'Moderado',cls:'sev-mod',  color:'#D97706'};
  return             {label:'Grave',    cls:'sev-grave', color:'#DC2626'};
}

// ═══════════════════════════════════════════════════
//  ANÁLISIS IA DEL ESPUTO — v3.2
// ═══════════════════════════════════════════════════
async function analyzeSputoIA(imageDataUrl) {
  if (!imageDataUrl) return;
  S.aiAnalyzing = true;
  S.aiGrade = null; S.aiCode = null; S.aiConfidence = null; S.aiReasoning = null;
  render();

const PROMPT_MURRAY = `Eres un sistema experto en clasificación visual de muestras de esputo bronquial según la escala Murray (Murray et al., 2009). Tu trabajo es asignar un grado del 1 al 8 basándote en el COLOR PREDOMINANTE de la muestra.

ESCALA MURRAY DE COLOR:
- Grado 1: blanco transparente o translúcido (mucoso M)
- Grado 2: blanco con leve tinte gris (mucoso M)
- Grado 3: amarillo muy pálido / crema (mucopurulento MP)
- Grado 4: amarillo claro definido (mucopurulento MP)
- Grado 5: amarillo intenso saturado (purulento P)
- Grado 6: amarillo-verdoso o verde-oliva claro (purulento P)
- Grado 7: verde-oliva oscuro (purulento grave P+)
- Grado 8: verde-oliva muy oscuro o marrón verdoso (purulento grave P+)

REGLA FUNDAMENTAL — USA TODA LA ESCALA:
La distribución esperada de muestras va del Grado 1 al Grado 8. Cualquier amarillo claramente saturado es Grado 5 o superior — NO lo clasifiques como Grado 3 o 4 por defecto. Si ves verde, es Grado 6 o superior. Si ves verde oscuro, es Grado 7 u 8. No tengas miedo de asignar grados altos cuando el color lo indica.

CRITERIO DE COLOR DOMINANTE:
- Clasifica por el color del esputo en sí, no por el contexto.
- NO descartes color por suponer que sea iluminación: el color que ves ES el dato.
- Solo si la imagen tiene un dominante extremo (foto bajo luz roja, sepia evidente) considera ajuste, y siempre dilo en reasoning.
- Si dudas entre dos grados adyacentes, elige el SUPERIOR (más conservador clínicamente).

ENTRADAS VÁLIDAS:
Acepta cualquier formato: muestra real con recipiente, sobre papel, en placa, o muestra de color homogénea sin contexto. Una muestra abstracta de color ES un input válido — clasifícala por su color.

CASOS ESPECIALES:
- Si ves sangre roja franca: clasifica el grado del esputo de fondo y menciona "hemoptisis" en reasoning.
- Si ves marrón rojizo (sangre antigua/hemosiderosis): puede ser Grado 7-8 con componente hemático.
- grade=null SOLO si la imagen no contiene esputo identificable (cara, paisaje, texto, imagen totalmente negra).

CONFIANZA — calibración:
- "alta": color inequívoco, condiciones razonables.
- "media": color claro pero condiciones imperfectas (algo de luz, encuadre regular).
- "baja": color realmente ambiguo o imagen muy degradada. NO uses "baja" solo porque la luz no sea perfecta.

FORMATO DE RESPUESTA:
Responde EXCLUSIVAMENTE con JSON válido, sin backticks ni texto adicional:
{"grade":<1-8>,"code":"<M|MP|P|P+>","confidence":"<alta|media|baja>","reasoning":"<máx 15 palabras en español, descriptivo del color>"}`;
  try {
    const base64 = imageDataUrl.split(",")[1];
    const mediaType = imageDataUrl.startsWith("data:image/png") ? "image/png" : "image/jpeg";

    const response = await fetch("https://bronco-color-ia.david-rosa23.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 500,
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
          { type: "text", text: PROMPT_MURRAY }
        ]}]
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`API error ${response.status}: ${errText.substring(0, 200)}`);
    }

    const data = await response.json();
    const raw = data.content?.[0]?.text || "";
    console.log("IA respuesta cruda:", raw);

    // Extraer JSON de forma robusta: buscar el primer { y el último }
    let jsonText = raw.trim();
    const firstBrace = jsonText.indexOf("{");
    const lastBrace = jsonText.lastIndexOf("}");
    if (firstBrace === -1 || lastBrace === -1 || lastBrace < firstBrace) {
      throw new Error("La IA no devolvió JSON. Respuesta: " + raw.substring(0, 150));
    }
    jsonText = jsonText.substring(firstBrace, lastBrace + 1);

    const result = JSON.parse(jsonText);

    S.aiGrade = (result.grade >= 1 && result.grade <= 8) ? result.grade : null;
    S.aiCode = result.code || null;
    S.aiConfidence = result.confidence || null;
    S.aiReasoning = result.reasoning || null;

    if (S.aiGrade) {
      S.wMurray = S.aiGrade - 1;
      S.wMurrayGrade = String(S.aiGrade);
    }
    console.log("IA esputo: Grado", S.aiGrade, S.aiCode, "confianza", S.aiConfidence, "—", S.aiReasoning);

  } catch (e) {
    console.error("analyzeSputoIA error:", e.message);
    S.aiGrade = null;
    S.aiReasoning = "Error al analizar (revisa consola)";
  } finally {
    S.aiAnalyzing = false;
    render();
    updateWizardBar();
  }
}

function loginClinic(){
  const rawVal = document.getElementById('clinic-pwd-input')?.value || '';
  const pwd    = rawVal.trim().toUpperCase().replace(/\s/g,'');
  const role   = S._selectedClinicRole;
  const errEl  = document.getElementById('clinic-login-error');
  if(errEl) errEl.textContent = '';

  if(!pwd){ if(errEl) errEl.textContent='Escribe la clave de acceso'; return; }
  const pN = (CLINIC_PASSWORDS?.neumo   || 'NEUMO').trim().toUpperCase();
  const pG = (CLINIC_PASSWORDS?.gestora || 'GESTORA').trim().toUpperCase();
  if(role==='neumo'   && pwd===pN){ S.clinicRole='neumo';   enterClinic(); return; }
  if(role==='gestora' && pwd===pG){ S.clinicRole='gestora'; enterClinic(); return; }
  if(pwd===pN && role!=='neumo'){   if(errEl) errEl.textContent='✋ Esa clave es de Neumología'; return; }
  if(pwd===pG && role!=='gestora'){ if(errEl) errEl.textContent='✋ Esa clave es de Gestora'; return; }
  if(errEl) errEl.textContent='❌ Clave incorrecta';
}

function getBaseline(patientId){
  const stable=S.records.filter(r=>r.patientId===patientId&&r.cat!=null&&r.tipoVisita==='semanal');
  if(stable.length<4) return null;
  return Math.round(stable.slice(0,4).reduce((a,r)=>a+r.cat,0)/4);
}
function murrayRank(code){ return{M:0,MP:1,P:2,'P+':3}[code]??0; }
function prevMurray(patientId){
  const prev=S.records.filter(r=>r.patientId===patientId&&r.murray&&r.tipoVisita==='semanal').slice(-1)[0];
  return prev?prev.murray:null;
}

function computeAlert(record, baseline){
  const {cat,murray,tipoVisita,symptoms,wellbeing} = record;
  const catDiff  = baseline!==null ? cat - baseline : null;
  const prevM    = prevMurray(record.patientId);
  const rankNow  = murrayRank(murray);
  const rankPrev = prevM ? murrayRank(prevM) : rankNow;
  const murrayUp = rankNow - rankPrev;
  const hasHemoptisis = symptoms.includes('Hemoptisis');
  // ── ROJO ──
  const redCriteria = [
    catDiff!==null && catDiff>=6, murray==='P+', murrayUp>=2, hasHemoptisis,
    tipoVisita==='urgente'&&(murray==='P'||murray==='P+'),
    wellbeing==='peor'&&symptoms.length>=2,
  ];
  if(redCriteria.some(Boolean)) return 'rojo';
  // ── ÁMBAR ──
  const amberCriteria = [
    catDiff!==null && catDiff>=3,
    murrayUp===1&&symptoms.length===0,
    murray==='P'&&(rankPrev<=1),
    wellbeing==='algo-peor'&&symptoms.length>=1,
    tipoVisita==='seguimiento'&&catDiff!==null&&catDiff>=3,
    baseline===null&&tipoVisita==='urgente',
  ];
  if(amberCriteria.some(Boolean)) return 'ambar';
  return 'verde';
}

function wizardSubmit(){
  const btn=document.querySelector('.btn-success');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Enviando...'; }
  try {
    const catTotal=S.wCatAnswers.reduce((a,v)=>a+(v??0),0);
    const m=MURRAY[S.wMurray]; const pid=S.patientId||'BC-042';
    const baseline=getBaseline(pid);
    const record={
      id:`REC-${Date.now()}`, fecha:new Date().toISOString().split('T')[0],
      patientId:pid, tipoVisita:S.wVisitType, murray:m.code, murrayGrade:m.grade,
      cat:catTotal, catAnswers:[...S.wCatAnswers], symptoms:[...S.wSymptoms],
      wellbeing:S.wWellbeing, clinGrade:null, image:S.wImage, baseline,
      aiGrade:S.aiGrade, aiCode:S.aiCode, aiConfidence:S.aiConfidence,
      alertLevel:computeAlert({cat:catTotal,murray:m.code,tipoVisita:S.wVisitType,symptoms:[...S.wSymptoms],wellbeing:S.wWellbeing,patientId:pid},baseline),
    };
    S.records.push(record);
    S.wVisitType=null; S.wCatAnswers=Array(8).fill(null); S.wMurray=null; S.wSymptoms=[]; S.wWellbeing='igual'; S.wImage=null;
    S.aiAnalyzing=false; S.aiGrade=null; S.aiCode=null; S.aiConfidence=null; S.aiReasoning=null;
    S.pView='success';
    document.getElementById('wizard-bar').classList.add('hidden');
    render();
    setTimeout(()=>{ pNav('inicio',document.getElementById('np-inicio')); }, 3000);
    setTimeout(async()=>{
      try{ if(window.DB) await window.DB.saveRecord(record); }catch(e){ console.warn('Firebase save:',e.message); }
      try{ await window.sendAlertEmail(record,record.alertLevel); }catch(e){}
    },100);
    return;
  } catch(e){
    console.error('wizardSubmit error:',e);
    if(btn){ btn.disabled=false; btn.textContent='✅ Confirmar y enviar'; }
    alert('Hubo un problema al enviar. Inténtalo de nuevo.');
  }
}

function capPhoto(){
  const vid=S.videoEl||document.getElementById('videoEl');

  const c=document.getElementById('canvasEl');
  c.width=vid.videoWidth||1280; c.height=vid.videoHeight||960;
  c.getContext('2d').drawImage(vid,0,0);

  S.aiGrade=null; S.aiCode=null; S.aiConfidence=null; S.aiReasoning=null;

function pickFile(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=ev=>{S.wImage=ev.target.result;
    S.wMurray=null; S.wMurrayGrade=null;
    S.aiGrade=null; S.aiCode=null; S.aiConfidence=null; S.aiReasoning=null;
    render(); updateWizardBar();
    analyzeSputoIA(S.wImage);

function selVisit(code){
  S.wVisitType=code;
  document.querySelectorAll(".visit-card").forEach(c=>c.classList.toggle("selected",c.dataset.code===code));
  const btn=document.querySelector(".wizard-nav .btn-primary"); if(btn) btn.disabled=false;
  const existing=document.getElementById("urgent-notice"); if(existing) existing.remove();
  if(code==="urgente"){
    const notice=document.createElement("div"); notice.id="urgent-notice"; notice.className="alert al-o"; notice.style.marginTop="14px";
    notice.innerHTML='<div class="al-dot do"></div><div class="al-text"><strong>Visita por síntomas</strong>El equipo recibirá una alerta con tus datos de hoy.</div>';
    document.querySelector(".card-body")?.appendChild(notice);
  }
}
function selMurray(i){
  S.wMurray=i; S.wMurrayGrade=MURRAY[i].grade;
  document.querySelectorAll('.m-item').forEach((el,j)=>el.classList.toggle('sel',j===i));
  const btn=document.querySelector('.wizard-nav .btn-primary'); if(btn) btn.disabled=false;
  const m=MURRAY[i]; const existing=document.getElementById('murray-alert'); if(existing) existing.remove();
  const alertDiv=document.createElement('div'); alertDiv.id='murray-alert'; alertDiv.className=`alert ${m.ac}`; alertDiv.style.marginBottom='0';
  alertDiv.innerHTML=`<div class="al-dot ${m.dc}"></div><div class="al-text"><strong>${m.at} — Grado ${m.grade}</strong>${m.am}</div>`;
  const grid=document.querySelector('.murray-grid'); if(grid) grid.after(alertDiv);
}
function setCat(idx,val){
  S.wCatAnswers[idx]=val;
  document.querySelectorAll(`.ct[data-i="${idx}"] .cat-btn`).forEach((b,j)=>{b.className='cat-btn'+(j===val?` s${val}`:'');});
  refreshCatScore();
  const ans=S.wCatAnswers.filter(v=>v!==null).length;
  const btn=document.querySelector('.wizard-nav .btn-primary');
  if(btn){ btn.disabled=(ans<8); btn.textContent=ans<8?`Siguiente → (${ans}/8)`:'Siguiente → ✓'; }
}
function refreshCatScore(){
  const t=S.wCatAnswers.reduce((a,v)=>a+(v??0),0); const ans=S.wCatAnswers.filter(v=>v!==null).length;
  const el=document.getElementById('cat-score'); if(!el) return;
  const lv=catLevel(t);
  el.innerHTML=`<div class="cat-score-box">
    <div><div class="cat-num">${t}</div><div style="font-size:11px;color:var(--grey-500);">/40 · ${ans}/8</div></div>
    <div style="text-align:right;"><span class="tag cat-badge ${lv.cls}">${lv.label}</span><div class="cat-pbar" style="margin-top:6px;"><div class="cat-pfill" style="width:${Math.round(t/40*100)}%;background:${lv.color};"></div></div></div>
  </div>
  ${ans===8&&t>=3&&S.records.filter(r=>r.cat).length>0?`<div class="alert al-${t<=10?'g':t<=20?'a':'r'}" style="margin-bottom:12px;"><div class="al-dot d${t<=10?'g':t<=20?'a':'r'}"></div><div class="al-text"><strong>Cambio respecto al último CAT</strong>Último valor: ${S.records.filter(r=>r.cat).slice(-1)[0].cat} pts · Hoy: ${t} pts · Diferencia: ${t-S.records.filter(r=>r.cat).slice(-1)[0].cat>0?'+':''}${t-S.records.filter(r=>r.cat).slice(-1)[0].cat} pts (MCID=3)</div></div>`:''}`;
}
function toggleSym(s){
  const i=S.wSymptoms.indexOf(s); i>=0?S.wSymptoms.splice(i,1):S.wSymptoms.push(s);
  document.querySelectorAll('.sc').forEach(c=>c.classList.toggle('active',S.wSymptoms.includes(c.dataset.s)));
}
function setWB(w){
  S.wWellbeing=w;
  document.querySelectorAll('.wc').forEach(c=>c.classList.toggle('active',c.dataset.v===w));
}
// Live BSI/e-FACED update in profile form
function updateScoreLive(){
  const f=id=>document.getElementById(id);
  const p={
    age:parseInt(f('pf-age')?.value)||0, weight:parseFloat(f('pf-weight')?.value)||0,
    height:parseFloat(f('pf-height')?.value)||0, fev1pct:parseFloat(f('pf-fev')?.value)||0,
    mrc:parseInt(f('pf-mrc')?.value)||0, exacPrev:parseInt(f('pf-exac')?.value)||0,
    hospPrev:f('pf-hosp')?.checked||false, psa:f('pf-psa')?.checked||false,
    otherPPM:f('pf-ppm')?.checked||false, lobes:parseInt(f('pf-lobes')?.value)||1,
    cystic:f('pf-cystic')?.checked||false,
  };
  // IMC display
  if(p.weight>0&&p.height>0){
    const bmi=(p.weight/((p.height/100)**2)).toFixed(1);
    const bmiEl=document.getElementById('bmi-live'); if(bmiEl) bmiEl.textContent=`IMC: ${bmi} kg/m²`;
  }
  const bsi=computeBSI(p); const ef=computeEFACED(p);
  const bsiSev=bsiSeverity(bsi); const efSev=efacedSeverity(ef);
  const bsiEl=document.getElementById('score-bsi-val'); const efEl=document.getElementById('score-ef-val');
  const bsiSevEl=document.getElementById('score-bsi-sev'); const efSevEl=document.getElementById('score-ef-sev');
  if(bsiEl){ bsiEl.textContent=bsi??'—'; bsiEl.style.color=bsiSev.color; }
  if(efEl) { efEl.textContent=ef??'—';  efEl.style.color=efSev.color; }
  if(bsiSevEl){ bsiSevEl.textContent=bsiSev.label; bsiSevEl.style.color=bsiSev.color; }
  if(efSevEl) { efSevEl.textContent=efSev.label;   efSevEl.style.color=efSev.color; }
}

}

function exportCSV(){
  const hdr=['ID','Fecha','Paciente','TipoVisita','Murray_IA','Murray_Clinico','CAT','Bienestar','Síntomas','BSI','e-FACED'];
  const rows=S.records.map(r=>{

    return[r.id,r.fecha,r.patientId,r.tipoVisita||'',r.murray||'',r.clinGrade||'',r.cat??'',r.wellbeing||'',(r.symptoms||[]).join(';'),p?.bsi??'',p?.efaced??''];

function render(){
  const root=document.getElementById('root');
  root.style.paddingTop=S.pView==='wizard'?'56px':'0';
  if(S.role==='login')         { root.innerHTML=renderLogin();       return; }
  if(S.role==='clinico-login') {

    document.getElementById('bnav-c').className='bnav hidden';
    document.getElementById('wizard-bar').classList.add('hidden');
    root.innerHTML=renderClinicLogin(); return;

function bindP(){
  document.querySelectorAll('.visit-card').forEach(c=>{ c.addEventListener('click',()=>selVisit(c.dataset.code)); if(c.dataset.code===S.wVisitType) c.classList.add('selected'); });
  document.querySelectorAll('.m-item').forEach((el,i)=>{ el.addEventListener('click',()=>selMurray(i)); if(i===S.wMurray) el.classList.add('sel'); });

function bindC(){

      ${S.wImage?`<div class="summary-row"><div class="summary-label">Fotografía</div><div><img src="${S.wImage}" style="width:60px;height:60px;border-radius:7px;object-fit:cover;border:1px solid var(--grey-200);"></div></div>`:''}
    <div class="summary-row"><div class="summary-label">CAT hoy</div><div class="summary-value">

    ${S.wSymptoms.length?`<div class="summary-row"><div class="summary-label">Síntomas</div><div>${S.wSymptoms.map(s=>`<span class="sym-chip">${s}</span>`).join('')}</div></div>`:''}
  </div></div>
  ${(()=>{const bl=getBaseline(S.patientId||'BC-042');const al=computeAlert({cat:catTotal,murray:m.code,tipoVisita:S.wVisitType,symptoms:S.wSymptoms,wellbeing:S.wWellbeing,patientId:S.patientId||'BC-042'},bl);

    if(al==='ambar') return`<div class="alert al-a"><div class="al-dot da"></div><div class="al-text"><strong>🟡 Alerta moderada</strong>La gestora de casos revisará tus datos en las próximas 24–48 horas.</div></div>`;
    return`<div class="alert al-g"><div class="al-dot dg"></div><div class="al-text"><strong>🟢 Registro rutinario</strong>Tus datos están dentro de tu rango habitual.</div></div>`;
  })()}
  <button class="btn btn-success btn-full" onclick="wizardSubmit()" style="font-size:15px;padding:14px;margin-bottom:8px;">✅ Confirmar y enviar</button>
  <button class="btn btn-ghost btn-full btn-sm" onclick="wizardBack()">← Revisar respuestas</button>`;
}

// ── PANEL CLÍNICO ───────────────────────────────────
function getPatientSummary(){
  const byPid={};
  S.records.forEach(r=>{if(!byPid[r.patientId]) byPid[r.patientId]=[]; byPid[r.patientId].push(r);});
  return Object.entries(byPid).map(([pid,recs])=>{
    const sorted=[...recs].sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const last=sorted[sorted.length-1]; const catRecs=sorted.filter(r=>r.cat!=null); const murRecs=sorted.filter(r=>r.murray);
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-7);
    const recent=sorted.filter(r=>new Date(r.fecha)>=cutoff);
    const alertPriority={rojo:3,ambar:2,verde:1};
    const topAlert=recent.reduce((best,r)=>(alertPriority[r.alertLevel]||0)>(alertPriority[best]||0)?r.alertLevel:best,'verde');
    const baseline=last?.baseline??(catRecs.length>=4?Math.round(catRecs.slice(0,4).reduce((a,r)=>a+r.cat,0)/4):null);
    const prof=S.profiles[pid]||null;
    return{pid,recs:sorted,last,catRecs,murRecs,topAlert,baseline,prof,
      lastMurray:murRecs[murRecs.length-1]?.murray,
      lastCatVal:catRecs[catRecs.length-1]?.cat,
      lastFecha:last?.fecha,
      alertRecs:recent.filter(r=>r.alertLevel&&r.alertLevel!=='verde'),
    };
  }).sort((a,b)=>{const p={rojo:3,ambar:2,verde:1};return(p[b.topAlert]||0)-(p[a.topAlert]||0)||a.pid.localeCompare(b.pid);});
}

      <div style="background:var(--grey-100);border-radius:8px;height:65px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;color:var(--grey-400);font-size:12px;">🖼️ Imagen del paciente</div>
      ${img.reviewed?`<div style="display:flex;align-items:center;gap:6px;padding:7px 9px;background:var(--green-50);border-radius:7px;border:1px solid #BBF7D0;font-size:12px;color:var(--green-700);font-weight:500;">✅ Clínico: <strong>${img.clinGrade}</strong> · IA: <strong>${img.aiCode}</strong> · ${img.clinGrade===img.aiCode?'<span style="color:var(--green-600)">Concordante ✓</span>':'<span style="color:var(--amber-600)">Discordante !</span>'}</div>`
      :`<div style="display:flex;gap:5px;flex-wrap:wrap;">${MURRAY.map(m=>`<button class="btn btn-ghost btn-sm clin-rate-btn" data-id="${img.id}" data-code="${m.code}" style="flex:1;min-width:48px;gap:3px;font-size:11px;"><div style="width:8px;height:8px;border-radius:2px;background:${mc[m.code]};border:1px solid rgba(0,0,0,.15);flex-shrink:0;"></div>${m.code}</button>`).join('')}</div>`}
    </div>`;}).join('')}
  </div></div>`;
}

function renderCCorr(){
  const paired=S.records.filter(r=>r.murray&&r.cat!=null);
  return`<div class="card"><div class="card-hdr"><div class="ci">📈</div><h2>Correlación Murray · CAT</h2></div>
  <div class="card-body">
    <div class="alert al-b" style="margin-bottom:13px;"><div class="al-dot db"></div><div class="al-text"><strong>${paired.length} registros emparejados</strong>Color del esputo + CAT el mismo día.</div></div>
    ${paired.length?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px;">
      ${MURRAY.map(m=>{const sub=paired.filter(r=>r.murray===m.code);const mean=sub.length?Math.round(sub.reduce((a,r)=>a+r.cat,0)/sub.length):null;
      return sub.length?`<div style="background:${mc[m.code]}22;border:1px solid ${mc[m.code]}55;border-radius:9px;padding:10px;"><div style="font-size:11px;font-weight:700;margin-bottom:3px;">${m.label}</div><div style="font-size:22px;font-weight:700;font-family:var(--mono);">${mean}<span style="font-size:10px;color:var(--grey-400);"> pts</span></div><div style="font-size:10px;color:var(--grey-400);">n=${sub.length}</div></div>`:'';}).join('')}
    </div>`:`<p style="color:var(--grey-400);font-size:13px;text-align:center;padding:20px 0;">Sin datos emparejados todavía.</p>`}
  </div></div>`;
}

function renderCData(){
  const withCat=S.records.filter(r=>r.cat!=null).length;
  const withM=S.records.filter(r=>r.murray).length;
  const paired=S.records.filter(r=>r.murray&&r.cat!=null).length;
  const withProfile=Object.keys(S.profiles).length;
  const rev=S.pending.filter(r=>r.reviewed).length;
  const conc=rev?Math.round(S.pending.filter(r=>r.reviewed&&r.clinGrade===r.aiCode).length/rev*100):0;
  return`<div class="card"><div class="card-hdr"><div class="ci">💾</div><h2>Datos del estudio</h2></div>
  <div class="card-body">
    <div class="stat-g" style="margin-bottom:13px;">
      <div class="stat-b"><div class="stat-n">${S.records.length}</div><div class="stat-l">Total</div></div>
      <div class="stat-b"><div class="stat-n">${paired}</div><div class="stat-l">Emparejados</div></div>
      <div class="stat-b"><div class="stat-n">${withProfile}</div><div class="stat-l">Con perfil BSI</div></div>
    </div>
    <button class="btn btn-primary btn-full" onclick="exportCSV()" style="margin-bottom:8px;">📥 Descargar CSV (incluye BSI y e-FACED)</button>
  </div></div>
  <div class="card"><div class="card-hdr"><div class="ci">ℹ️</div><h2>Estado del estudio</h2></div>
  <div class="card-body">
    ${[['Versión','BRONCO-COLOR v3.1'],['Fase','A — Validación técnica'],['Firebase',window.FIREBASE_READY?'✅ Conectado':'⚠️ Modo demo'],['Registros esputo',withM],['Registros CAT',withCat],['Perfiles clínicos',withProfile],['Concordancia IA',`${rev} revisados · ${conc}%`]].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--grey-100);font-size:12px;"><span style="color:var(--grey-500);">${k}</span><span style="color:var(--grey-900);font-family:var(--mono);font-size:11px;">${v}</span></div>`).join('')}
  </div></div>`;
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
setTimeout(()=>{
  const dot=document.getElementById('db-dot');
  if(window.FIREBASE_READY&&window.EMAILJS_READY) dot.className='db-dot online';
  else if(window.FIREBASE_READY) dot.className='db-dot online';
  else dot.className='db-dot offline';
},900);
setTimeout(()=>{ loadClinicPasswords(); }, 1200);
setTimeout(()=>{ initApiKey(); }, 800);

render();
</script>
</body>
</html>
